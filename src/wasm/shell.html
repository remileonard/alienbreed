<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alien Breed Special Edition 92</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #c8c8c8;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 16px 8px;
      overflow-x: hidden;
    }

    h1 {
      color: #e84040;
      font-size: clamp(14px, 3vw, 22px);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 0 12px #e84040aa;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 14px;
    }

    #canvas-wrapper {
      position: relative;
      display: inline-block;
      border: 2px solid #333;
      box-shadow: 0 0 24px #e8404044;
      background: #000;
      /* Keeps the canvas visually centered on small screens */
      max-width: 100%;
    }

    canvas {
      display: block;
      /* SDL sets logical size 320×256; let the browser scale uniformly. */
      width: min(640px, 100vw - 16px);
      height: auto;
      aspect-ratio: 320 / 256;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* Prevent default browser touch gestures (scroll, zoom) on the canvas */
      touch-action: none;
    }

    #status-bar {
      margin-top: 10px;
      font-size: 12px;
      color: #e84040;
      letter-spacing: 1px;
      min-height: 18px;
      text-align: center;
    }

    #progress-wrap {
      width: min(640px, 100vw - 16px);
      height: 4px;
      background: #1a1a1a;
      margin-top: 6px;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #e84040, #ff8040);
      transition: width 0.15s ease;
      border-radius: 2px;
    }

    .controls {
      margin-top: 18px;
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.8;
      max-width: 640px;
    }

    .controls span { color: #888; }

    /* Hide controls and progress once the game is running */
    body.running #progress-wrap,
    body.running .controls { display: none; }
    body.running #status-bar { color: #555; }

    /* ------------------------------------------------------------------ */
    /* Touch controls — only shown on touch-capable devices               */
    /* ------------------------------------------------------------------ */
    #touch-controls {
      display: none;          /* hidden by default; JS adds .touch-device  */
      position: relative;     /* anchor for the audio-unlock overlay        */
      width: 100%;
      max-width: min(640px, 100vw - 16px);
      padding: 10px 4px 4px;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
      /* Prevent text selection and default touch handling on the overlay */
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* Primary mechanism: CSS media query — works without any JS.
     * (pointer: coarse) is true on all phones and tablets, including iPhone. */
    @media (pointer: coarse) {
      #touch-controls { display: flex; }
      .controls { display: none; }
    }

    /* Fallback: JS-detected touch device (belt-and-suspenders) */
    body.touch-device #touch-controls { display: flex; }
    body.touch-device .controls { display: none; }

    /* Virtual joystick ----------------------------------------------------- */
    #joystick-container {
      position: relative;
      width: 130px;
      height: 130px;
      flex-shrink: 0;
      touch-action: none;
    }

    #joystick-base {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(232, 64, 64, 0.08);
      border: 2px solid rgba(232, 64, 64, 0.35);
    }

    #joystick-thumb {
      position: absolute;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(232, 64, 64, 0.30);
      border: 2px solid rgba(232, 64, 64, 0.70);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    #joystick-thumb.active {
      background: rgba(232, 64, 64, 0.55);
      border-color: #e84040;
    }

    /* Action buttons ------------------------------------------------------- */
    #action-btns {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    #action-top-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action-btn {
      background: rgba(232, 64, 64, 0.12);
      border: 1.5px solid rgba(232, 64, 64, 0.55);
      color: #e84040;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      transition: background 0.05s;
      min-width: 48px;
      height: 44px;
      font-family: 'Courier New', Courier, monospace;
    }

    .action-btn.pressed,
    .action-btn:active {
      background: rgba(232, 64, 64, 0.45);
    }

    #btn-fire {
      height: 68px;
      min-width: 96px;
      font-size: 13px;
      letter-spacing: 2px;
    }

    /* Debug popup ---------------------------------------------------------- */
    #debug-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #debug-overlay.visible { display: flex; }

    #debug-popup {
      background: #111;
      border: 1.5px solid rgba(232, 64, 64, 0.65);
      border-radius: 12px;
      padding: 18px 16px;
      min-width: 230px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    #debug-popup-title {
      color: #e84040;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #debug-btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
    }

    .debug-btn {
      background: rgba(232, 64, 64, 0.10);
      border: 1.5px solid rgba(232, 64, 64, 0.45);
      color: #e84040;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 8px;
      cursor: pointer;
      padding: 10px 4px;
      text-align: center;
      line-height: 1.4;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      font-family: 'Courier New', Courier, monospace;
    }

    .debug-btn.pressed,
    .debug-btn:active { background: rgba(232, 64, 64, 0.40); }

    #debug-close {
      background: rgba(232, 64, 64, 0.12);
      border: 1.5px solid rgba(232, 64, 64, 0.55);
      color: #e84040;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 8px;
      cursor: pointer;
      padding: 8px 24px;
      font-family: 'Courier New', Courier, monospace;
      -webkit-tap-highlight-color: transparent;
    }

    /* Audio unlock overlay — sits over the touch-controls panel.
     * Hidden by default; JS adds .visible after onRuntimeInitialized on
     * touch devices.  On desktop the parent #touch-controls is never shown
     * so this overlay is never visible there either. */
    #audio-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.82);
      color: #e84040;
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      padding: 16px;
      z-index: 10;
      border-radius: 4px;
    }

    #audio-overlay.visible {
      display: flex;
    }
  </style>
</head>
<body>
  <h1>Alien Breed Special Edition 92</h1>
  <p class="subtitle">Team17 &bull; WebAssembly Port</p>

  <div id="canvas-wrapper">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  </div>

  <div id="status-bar">Loading&hellip;</div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <div class="controls">
    <span>Arrow keys / WASD</span> — Move &nbsp;&bull;&nbsp;
    <span>Left Ctrl / Z</span> — Fire &nbsp;&bull;&nbsp;
    <span>Q / Right Alt</span> — Next weapon<br>
    <span>P</span> — Pause &nbsp;&bull;&nbsp;
    <span>M</span> — Map overview &nbsp;&bull;&nbsp;
    <span>ESC</span> — Game over / quit
  </div>

  <!-- On-screen touch controller — shown only on touch-capable devices -->
  <div id="touch-controls">
    <!-- Audio unlock overlay — covers controls until first tap on iOS -->
    <div id="audio-overlay">
      Tap to start
    </div>

    <!-- Left: virtual joystick -->
    <div id="joystick-container">
      <div id="joystick-base"></div>
      <div id="joystick-thumb"></div>
    </div>

    <!-- Right: action buttons -->
    <div id="action-btns">
      <div id="action-top-row">
        <button class="action-btn" id="btn-map"
                data-key="m" data-code="KeyM" data-keycode="77">MAP</button>
        <button class="action-btn" id="btn-nextwpn"
                data-key="q" data-code="KeyQ" data-keycode="81">WPN</button>
        <button class="action-btn" id="btn-intex"
                data-key="x" data-code="KeyX" data-keycode="88">INTEX</button>
        <button class="action-btn" id="btn-pause"
                data-key="p" data-code="KeyP" data-keycode="80">&#9646;&#9646;</button>
        <button class="action-btn" id="btn-debug" title="Debug">&#9881;</button>
      </div>
      <button class="action-btn" id="btn-fire"
              data-key="z" data-code="KeyZ" data-keycode="90">FIRE</button>
    </div>
  </div>

  <!-- Debug popup — shown when the ⚙ button is tapped -->
  <div id="debug-overlay">
    <div id="debug-popup">
      <div id="debug-popup-title">Debug</div>
      <div id="debug-btn-grid">
        <button class="debug-btn" data-key="d" data-code="KeyD" data-keycode="68">DBG<br>OVRL</button>
        <button class="debug-btn" data-key="f" data-code="KeyF" data-keycode="70">GFX<br>VIEW</button>
        <button class="debug-btn" data-key="g" data-code="KeyG" data-keycode="71">PAL<br>VIEW</button>
        <button class="debug-btn" data-key="h" data-code="KeyH" data-keycode="72">SKIP<br>LVL</button>
        <button class="debug-btn" data-key="j" data-code="KeyJ" data-keycode="74">GOD<br>MODE</button>
        <button class="debug-btn" data-key="Escape" data-code="Escape" data-keycode="27">QUIT</button>
      </div>
      <button id="debug-close">CLOSE</button>
    </div>
  </div>

  <script>
    var statusEl   = document.getElementById('status-bar');
    var progressEl = document.getElementById('progress-bar');

    /* ------------------------------------------------------------------
     * iOS / Safari Web Audio unlock
     * iOS Safari suspends the AudioContext until a user gesture occurs.
     * Emscripten's SDL2 layer creates an AudioContext during WASM init
     * (before any gesture), so it starts in the 'suspended' state and
     * produces no sound.
     *
     * We monkey-patch the AudioContext constructor here — before the WASM
     * glue script runs — to track every context that Emscripten creates.
     * The unlockAudio handler (below) then calls .resume() on each of
     * them inside the first user-interaction event, which iOS requires.
     * ------------------------------------------------------------------ */
    (function () {
      var Orig = window.AudioContext || window.webkitAudioContext;
      if (!Orig) return;
      var _tracked = [];
      window._abAudioContexts = _tracked;

      function TrackedAC(opts) {
        var ctx;
        try { ctx = opts ? new Orig(opts) : new Orig(); }
        catch (e) { ctx = new Orig(); }
        _tracked.push(ctx);

        /* If the user already tapped before this context was created (e.g.
         * because SDL_mixer opens audio on the first game-loop tick rather
         * than in main()), resume it immediately.  The resume() call here is
         * synchronous and runs in the same JS task as SDL's constructor call,
         * which is close enough to the gesture for iOS to accept it. */
        if (window._abAudioUnlocked && ctx.state !== 'running') {
          try { ctx.resume(); } catch (e) {}
        }

        /* Re-resume whenever iOS auto-suspends the context (e.g. after the
         * page is backgrounded and then brought back to the foreground). */
        ctx.addEventListener('statechange', function () {
          if (window._abAudioUnlocked && ctx.state === 'suspended') {
            try { ctx.resume(); } catch (e) {}
          }
        });

        return ctx;
      }
      TrackedAC.prototype = Orig.prototype;
      window.AudioContext = TrackedAC;
      if (window.webkitAudioContext) window.webkitAudioContext = TrackedAC;
    })();

    var Module = {
      canvas: document.getElementById('canvas'),

      print: function(text) { console.log(text); },
      printErr: function(text) { console.error(text); },

      setStatus: function(text) {
        if (text) {
          /* Emscripten sends "Downloading data... (N/N)" style strings */
          var m = text.match(/\((\d+)\/(\d+)\)/);
          if (m) {
            progressEl.style.width = (100 * parseInt(m[1]) / parseInt(m[2])) + '%';
          }
          statusEl.textContent = text;
        } else {
          /* Empty string signals that loading is complete */
          statusEl.textContent = 'Running';
          document.body.classList.add('running');
        }
      },

      onRuntimeInitialized: function() {
        /* Canvas needs focus to receive keyboard events */
        document.getElementById('canvas').focus();
      },

      /* Prevent the default browser context-menu on right-click inside canvas */
      canvas: (function() {
        var c = document.getElementById('canvas');
        c.addEventListener('webglcontextlost', function(e) {
          alert('WebGL context lost. Please reload the page.');
          e.preventDefault();
        }, false);
        return c;
      })()
    };

    window.onerror = function(msg, url, line, col, err) {
      statusEl.textContent = 'Error: ' + msg;
      statusEl.style.color = '#ff4040';
    };

    /* ------------------------------------------------------------------
     * Touch controls
     * Detected on first script evaluation so the layout is ready before
     * the game finishes loading.
     * ------------------------------------------------------------------ */
    (function () {
      /* Audio-unlock overlay — works for both mouse click and touch tap */
      var overlay = document.getElementById('audio-overlay');
      var audioUnlocked = false;

      /* Play a one-frame silent buffer through an AudioContext.
       * On iOS this is the critical step: ctx.resume() alone is not enough
       * to unlock the hardware audio session — iOS requires that actual audio
       * nodes are activated within the user-gesture handler. */
      function playUnlockBuffer(ctx) {
        try {
          var buf = ctx.createBuffer(1, 1, ctx.sampleRate);
          var src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(ctx.destination);
          src.start(0);
          src.stop(0);
        } catch (err) { console.warn('playUnlockBuffer error:', err); }
      }

      function unlockAudio(e) {
        e.preventDefault();
        if (audioUnlocked) return;
        audioUnlocked = true;

        /* Signal TrackedAC to auto-resume any context created after this tap
         * (handles the case where SDL_mixer opens audio after onRuntimeInit). */
        window._abAudioUnlocked = true;

        /* Resume audio FIRST — iOS Safari requires ctx.resume() to be called
         * as early as possible inside the user-gesture handler, before any
         * DOM mutations that trigger layout/paint.  Then play a silent buffer
         * through each context: on iOS, resume() alone does not always unlock
         * the hardware audio session — actually scheduling a buffer source is
         * required. */
        if (window._abAudioContexts) {
          window._abAudioContexts.forEach(function (ctx) {
            if (ctx && ctx.state !== 'closed') {
              try { ctx.resume(); } catch (err) { console.error('AudioContext.resume error:', err); }
              playUnlockBuffer(ctx);
            }
          });
        }

        /* resumeMainLoop may throw if the main loop is not yet initialised;
         * wrap it so that failure here cannot block overlay removal. */
        try {
          if (window.Module && Module.resumeMainLoop) Module.resumeMainLoop();
        } catch (err) { console.error('resumeMainLoop error:', err); }

        /* Hide the overlay last — after all audio work is done and all
         * throwing calls are guarded — so it always runs. */
        overlay.classList.remove('visible');
      }

      /* once:true is safe here: the overlay has display:none when hidden so it
       * receives no pointer events, meaning these listeners can only fire when
       * the overlay is actually visible. The audioUnlocked flag also prevents
       * onRuntimeInitialized from re-showing the overlay after a tap. */
      overlay.addEventListener('click',      unlockAudio, { once: true });
      overlay.addEventListener('touchstart', unlockAudio, { once: true, passive: false });

      var isTouchDevice =
        ('ontouchstart' in window) ||
        (navigator.maxTouchPoints > 0) ||
        (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
      if (!isTouchDevice) return;

      document.body.classList.add('touch-device');

      /* On touch devices (e.g. iPhone/iPad with iOS Safari) the Web Audio
       * API requires a user gesture before any sound plays.  Show the
       * audio-unlock overlay once the WASM runtime is ready so the player
       * sees the "Tap to start" prompt and audio works from the first note.
       * The audioUnlocked guard prevents re-showing the overlay if the user
       * already tapped before onRuntimeInitialized fired (fast cached load). */
      var _origRTI = Module.onRuntimeInitialized;
      Module.onRuntimeInitialized = function () {
        if (_origRTI) _origRTI.call(this);
        if (!audioUnlocked) overlay.classList.add('visible');
      };

      var canvas = document.getElementById('canvas');

      /* Dispatch a synthetic keyboard event to the canvas so that
       * Emscripten's SDL2 layer picks it up exactly like a real keystroke. */
      function sendKey(key, code, keyCode, down) {
        canvas.dispatchEvent(new KeyboardEvent(down ? 'keydown' : 'keyup', {
          key: key,
          code: code,
          keyCode: keyCode,
          which: keyCode,
          bubbles: true,
          cancelable: true
        }));
      }

      /* ---- Virtual Joystick -------------------------------------------- */
      var jContainer = document.getElementById('joystick-container');
      var jThumb     = document.getElementById('joystick-thumb');

      /* Geometry (must match CSS): base=130px, thumb=54px */
      var J_BASE_R   = 65;   /* base radius  */
      var J_THUMB_R  = 27;   /* thumb radius */
      var J_MAX_DIST = J_BASE_R - J_THUMB_R;  /* max travel = 38px */
      var J_DEADZONE = 12;   /* px from centre before a direction fires */

      var DIR = {
        up:    { key: 'ArrowUp',    code: 'ArrowUp',    keyCode: 38 },
        down:  { key: 'ArrowDown',  code: 'ArrowDown',  keyCode: 40 },
        left:  { key: 'ArrowLeft',  code: 'ArrowLeft',  keyCode: 37 },
        right: { key: 'ArrowRight', code: 'ArrowRight', keyCode: 39 }
      };

      var joyState = { touchId: null, centerX: 0, centerY: 0, activeKeys: [] };

      /* Map (dx,dy) to the list of direction keys that should be held */
      function joyGetKeys(dx, dy) {
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < J_DEADZONE) return [];
        var ang = Math.atan2(dy, dx) * 180 / Math.PI;
        if (ang < 0) ang += 360;
        /* 8 equal sectors of 45°, sector 0 = East */
        var sec = Math.round(ang / 45) % 8;
        switch (sec) {
          case 0: return [DIR.right];
          case 1: return [DIR.right, DIR.down];
          case 2: return [DIR.down];
          case 3: return [DIR.down,  DIR.left];
          case 4: return [DIR.left];
          case 5: return [DIR.left,  DIR.up];
          case 6: return [DIR.up];
          case 7: return [DIR.up,    DIR.right];
          default: return [];
        }
      }

      /* Position thumb at (dx,dy) clamped to the base circle */
      function joyMoveThumb(dx, dy) {
        var dist  = Math.sqrt(dx * dx + dy * dy);
        var clamp = Math.min(dist, J_MAX_DIST);
        var nx = dist > 0 ? (dx / dist) * clamp : 0;
        var ny = dist > 0 ? (dy / dist) * clamp : 0;
        jThumb.style.transform =
          'translate(calc(-50% + ' + nx.toFixed(1) + 'px), ' +
                    'calc(-50% + ' + ny.toFixed(1) + 'px))';
      }

      /* Send only the key events that changed between old and new sets */
      function joyUpdateKeys(newKeys) {
        var old = joyState.activeKeys;
        var i, j, found;
        for (i = 0; i < old.length; i++) {
          found = false;
          for (j = 0; j < newKeys.length; j++) {
            if (old[i].code === newKeys[j].code) { found = true; break; }
          }
          if (!found) sendKey(old[i].key, old[i].code, old[i].keyCode, false);
        }
        for (i = 0; i < newKeys.length; i++) {
          found = false;
          for (j = 0; j < old.length; j++) {
            if (newKeys[i].code === old[j].code) { found = true; break; }
          }
          if (!found) sendKey(newKeys[i].key, newKeys[i].code, newKeys[i].keyCode, true);
        }
        joyState.activeKeys = newKeys;
      }

      function joyReleaseAll() {
        for (var i = 0; i < joyState.activeKeys.length; i++) {
          var k = joyState.activeKeys[i];
          sendKey(k.key, k.code, k.keyCode, false);
        }
        joyState.activeKeys = [];
      }

      function joyHandleStart(t) {
        if (joyState.touchId !== null) return;
        var rect = jContainer.getBoundingClientRect();
        joyState.touchId = t.identifier;
        joyState.centerX = rect.left + rect.width  / 2;
        joyState.centerY = rect.top  + rect.height / 2;
        jThumb.classList.add('active');
        joyHandleMove(t);
      }

      function joyHandleMove(t) {
        if (t.identifier !== joyState.touchId) return;
        var dx = t.clientX - joyState.centerX;
        var dy = t.clientY - joyState.centerY;
        joyMoveThumb(dx, dy);
        joyUpdateKeys(joyGetKeys(dx, dy));
      }

      function joyHandleEnd(t) {
        if (t.identifier !== joyState.touchId) return;
        joyState.touchId = null;
        joyReleaseAll();
        jThumb.style.transform = 'translate(-50%, -50%)';
        jThumb.classList.remove('active');
      }

      jContainer.addEventListener('touchstart', function (e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) joyHandleStart(e.changedTouches[i]);
      }, { passive: false });

      jContainer.addEventListener('touchmove', function (e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) joyHandleMove(e.changedTouches[i]);
      }, { passive: false });

      ['touchend', 'touchcancel'].forEach(function (evtype) {
        jContainer.addEventListener(evtype, function (e) {
          e.preventDefault();
          for (var i = 0; i < e.changedTouches.length; i++) joyHandleEnd(e.changedTouches[i]);
        }, { passive: false });
      });

      /* ---- Action buttons (MAP, WPN, PAUSE, FIRE) ----------------------- */
      var actionBtns = document.querySelectorAll('#action-btns [data-key]');
      actionBtns.forEach(function (btn) {
        var key     = btn.dataset.key;
        var code    = btn.dataset.code;
        var keyCode = parseInt(btn.dataset.keycode, 10);
        if (!key || !code || isNaN(keyCode)) return;

        btn.addEventListener('touchstart', function (e) {
          e.preventDefault();
          btn.classList.add('pressed');
          sendKey(key, code, keyCode, true);
        }, { passive: false });

        ['touchend', 'touchcancel'].forEach(function (evtype) {
          btn.addEventListener(evtype, function (e) {
            e.preventDefault();
            btn.classList.remove('pressed');
            sendKey(key, code, keyCode, false);
          }, { passive: false });
        });
      });

      /* ---- Debug popup -------------------------------------------------- */
      var debugOverlay = document.getElementById('debug-overlay');
      var btnDebugOpen = document.getElementById('btn-debug');
      var btnDebugClose = document.getElementById('debug-close');

      btnDebugOpen.addEventListener('touchstart', function (e) {
        e.preventDefault();
        debugOverlay.classList.add('visible');
      }, { passive: false });

      btnDebugClose.addEventListener('touchstart', function (e) {
        e.preventDefault();
        debugOverlay.classList.remove('visible');
      }, { passive: false });

      /* Tap outside the popup to close */
      debugOverlay.addEventListener('touchstart', function (e) {
        if (e.target === debugOverlay) {
          e.preventDefault();
          debugOverlay.classList.remove('visible');
        }
      }, { passive: false });

      /* Debug buttons fire a single keydown+keyup (they are toggle keys) */
      var debugBtns = document.querySelectorAll('.debug-btn');
      debugBtns.forEach(function (btn) {
        var key     = btn.dataset.key;
        var code    = btn.dataset.code;
        var keyCode = parseInt(btn.dataset.keycode, 10);

        btn.addEventListener('touchstart', function (e) {
          e.preventDefault();
          btn.classList.add('pressed');
          sendKey(key, code, keyCode, true);
          setTimeout(function () {
            sendKey(key, code, keyCode, false);
            btn.classList.remove('pressed');
          }, 80);
        }, { passive: false });
      });
    })();
  </script>

</body>
