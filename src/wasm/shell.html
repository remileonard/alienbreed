<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alien Breed Special Edition 92</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #c8c8c8;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 16px 8px;
      overflow-x: hidden;
    }

    h1 {
      color: #e84040;
      font-size: clamp(14px, 3vw, 22px);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 0 12px #e84040aa;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 14px;
    }

    #canvas-wrapper {
      position: relative;
      display: inline-block;
      border: 2px solid #333;
      box-shadow: 0 0 24px #e8404044;
      background: #000;
      /* Keeps the canvas visually centered on small screens */
      max-width: 100%;
    }

    canvas {
      display: block;
      /* SDL sets logical size 320×256; let the browser scale uniformly. */
      width: min(640px, 100vw - 16px);
      height: auto;
      aspect-ratio: 320 / 256;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* Prevent default browser touch gestures (scroll, zoom) on the canvas */
      touch-action: none;
    }

    #status-bar {
      margin-top: 10px;
      font-size: 12px;
      color: #e84040;
      letter-spacing: 1px;
      min-height: 18px;
      text-align: center;
    }

    #progress-wrap {
      width: min(640px, 100vw - 16px);
      height: 4px;
      background: #1a1a1a;
      margin-top: 6px;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #e84040, #ff8040);
      transition: width 0.15s ease;
      border-radius: 2px;
    }

    .controls {
      margin-top: 18px;
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.8;
      max-width: 640px;
    }

    .controls span { color: #888; }

    /* Hide controls and progress once the game is running */
    body.running #progress-wrap,
    body.running .controls { display: none; }
    body.running #status-bar { color: #555; }

    /* ------------------------------------------------------------------ */
    /* Touch controls — only shown on touch-capable devices               */
    /* ------------------------------------------------------------------ */
    #touch-controls {
      display: none;          /* hidden by default; JS adds .touch-device  */
      width: 100%;
      max-width: min(640px, 100vw - 16px);
      padding: 10px 4px 4px;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
      /* Prevent text selection and default touch handling on the overlay */
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* Primary mechanism: CSS media query — works without any JS.
     * (pointer: coarse) is true on all phones and tablets, including iPhone. */
    @media (pointer: coarse) {
      #touch-controls { display: flex; }
      .controls { display: none; }
    }

    /* Fallback: JS-detected touch device (belt-and-suspenders) */
    body.touch-device #touch-controls { display: flex; }
    body.touch-device .controls { display: none; }

    /* D-pad ---------------------------------------------------------------- */
    #dpad {
      display: grid;
      grid-template-areas:
        ". up ."
        "left center right"
        ". down .";
      grid-template-columns: 56px 24px 56px;
      grid-template-rows:    56px 24px 56px;
      gap: 3px;
    }

    .dpad-btn {
      background: rgba(232, 64, 64, 0.12);
      border: 1.5px solid rgba(232, 64, 64, 0.55);
      color: #e84040;
      font-size: 20px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      transition: background 0.05s;
    }

    .dpad-btn.pressed,
    .dpad-btn:active {
      background: rgba(232, 64, 64, 0.45);
    }

    #btn-dpad-up    { grid-area: up; }
    #btn-dpad-left  { grid-area: left; }
    #btn-dpad-right { grid-area: right; }
    #btn-dpad-down  { grid-area: down; }

    /* Action buttons ------------------------------------------------------- */
    #action-btns {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    #action-top-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action-btn {
      background: rgba(232, 64, 64, 0.12);
      border: 1.5px solid rgba(232, 64, 64, 0.55);
      color: #e84040;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      transition: background 0.05s;
      min-width: 48px;
      height: 44px;
    }

    .action-btn.pressed,
    .action-btn:active {
      background: rgba(232, 64, 64, 0.45);
    }

    #btn-fire {
      height: 68px;
      min-width: 96px;
      font-size: 13px;
      letter-spacing: 2px;
    }

    /* Audio unlock overlay */
    #audio-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.82);
      color: #e84040;
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      padding: 16px;
    }

    #audio-overlay.visible {
      display: flex;
    }
  </style>
</head>
<body>
  <h1>Alien Breed Special Edition 92</h1>
  <p class="subtitle">Team17 &bull; WebAssembly Port</p>

  <div id="canvas-wrapper">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="audio-overlay">
      Tap or click to start
    </div>
  </div>

  <div id="status-bar">Loading&hellip;</div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <div class="controls">
    <span>Arrow keys / WASD</span> — Move &nbsp;&bull;&nbsp;
    <span>Left Ctrl / Z</span> — Fire &nbsp;&bull;&nbsp;
    <span>Left Alt / X</span> — Next weapon<br>
    <span>P</span> — Pause &nbsp;&bull;&nbsp;
    <span>M</span> — Map overview &nbsp;&bull;&nbsp;
    <span>ESC</span> — Game over / quit
  </div>

  <!-- On-screen touch controller — shown only on touch-capable devices -->
  <div id="touch-controls">
    <!-- Left: D-pad -->
    <div id="dpad">
      <button class="dpad-btn" id="btn-dpad-up"
              data-key="ArrowUp" data-code="ArrowUp" data-keycode="38">&#9650;</button>
      <button class="dpad-btn" id="btn-dpad-left"
              data-key="ArrowLeft" data-code="ArrowLeft" data-keycode="37">&#9664;</button>
      <button class="dpad-btn" id="btn-dpad-right"
              data-key="ArrowRight" data-code="ArrowRight" data-keycode="39">&#9654;</button>
      <button class="dpad-btn" id="btn-dpad-down"
              data-key="ArrowDown" data-code="ArrowDown" data-keycode="40">&#9660;</button>
    </div>

    <!-- Right: action buttons -->
    <div id="action-btns">
      <div id="action-top-row">
        <button class="action-btn" id="btn-map"
                data-key="m" data-code="KeyM" data-keycode="77">MAP</button>
        <button class="action-btn" id="btn-intex"
                data-key="Escape" data-code="Escape" data-keycode="27">INTEX</button>
        <button class="action-btn" id="btn-nextwpn"
                data-key="x" data-code="KeyX" data-keycode="88">WPN</button>
        <button class="action-btn" id="btn-pause"
                data-key="p" data-code="KeyP" data-keycode="80">&#9646;&#9646;</button>
      </div>
      <button class="action-btn" id="btn-fire"
              data-key="z" data-code="KeyZ" data-keycode="90">FIRE</button>
    </div>
  </div>

  <script>
    var statusEl   = document.getElementById('status-bar');
    var progressEl = document.getElementById('progress-bar');

    var Module = {
      canvas: document.getElementById('canvas'),

      print: function(text) { console.log(text); },
      printErr: function(text) { console.error(text); },

      setStatus: function(text) {
        if (text) {
          /* Emscripten sends "Downloading data... (N/N)" style strings */
          var m = text.match(/\((\d+)\/(\d+)\)/);
          if (m) {
            progressEl.style.width = (100 * parseInt(m[1]) / parseInt(m[2])) + '%';
          }
          statusEl.textContent = text;
        } else {
          /* Empty string signals that loading is complete */
          statusEl.textContent = 'Running';
          document.body.classList.add('running');
        }
      },

      onRuntimeInitialized: function() {
        /* Canvas needs focus to receive keyboard events */
        document.getElementById('canvas').focus();
      },

      /* Prevent the default browser context-menu on right-click inside canvas */
      canvas: (function() {
        var c = document.getElementById('canvas');
        c.addEventListener('webglcontextlost', function(e) {
          alert('WebGL context lost. Please reload the page.');
          e.preventDefault();
        }, false);
        return c;
      })()
    };

    window.onerror = function(msg, url, line, col, err) {
      statusEl.textContent = 'Error: ' + msg;
      statusEl.style.color = '#ff4040';
    };

    /* ------------------------------------------------------------------
     * Touch controls
     * Detected on first script evaluation so the layout is ready before
     * the game finishes loading.
     * ------------------------------------------------------------------ */
    (function () {
      /* Audio-unlock overlay — works for both mouse click and touch tap */
      var overlay = document.getElementById('audio-overlay');
      function unlockAudio(e) {
        e.preventDefault();
        if (window.Module && Module.resumeMainLoop) Module.resumeMainLoop();
        overlay.classList.remove('visible');
      }
      overlay.addEventListener('click',      unlockAudio);
      overlay.addEventListener('touchstart', unlockAudio, { passive: false });

      var isTouchDevice =
        ('ontouchstart' in window) ||
        (navigator.maxTouchPoints > 0) ||
        (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
      if (!isTouchDevice) return;

      document.body.classList.add('touch-device');

      var canvas = document.getElementById('canvas');

      /* Dispatch a synthetic keyboard event to the canvas so that
       * Emscripten's SDL2 layer picks it up exactly like a real keystroke. */
      function sendKey(key, code, keyCode, down) {
        canvas.dispatchEvent(new KeyboardEvent(down ? 'keydown' : 'keyup', {
          key: key,
          code: code,
          keyCode: keyCode,
          which: keyCode,
          bubbles: true,
          cancelable: true
        }));
      }

      /* ---- Unified D-pad handler (supports diagonals and slide gestures) --
       * We attach all touch events to the #dpad container so that a finger
       * sliding between buttons — or two fingers pressing simultaneously —
       * correctly fires keydown/keyup for every direction involved.
       * -------------------------------------------------------------------- */
      var dpad      = document.getElementById('dpad');
      var dpadState = {};   /* touchIdentifier → { btn, key, code, keyCode } */

      function dpadBtnAt(x, y) {
        var el = document.elementFromPoint(x, y);
        while (el) {
          if (el.classList && el.classList.contains('dpad-btn')) return el;
          el = el.parentElement;
        }
        return null;
      }

      function dpadUpdate(changedTouches) {
        for (var i = 0; i < changedTouches.length; i++) {
          var t   = changedTouches[i];
          var id  = t.identifier;
          var el  = dpadBtnAt(t.clientX, t.clientY);
          var cur = dpadState[id];
          var curKey = cur ? cur.key : null;
          var newKey = el ? el.dataset.key : null;

          if (curKey === newKey) continue;   /* nothing changed for this touch */

          /* Release the old direction */
          if (cur) {
            cur.btn.classList.remove('pressed');
            sendKey(cur.key, cur.code, cur.keyCode, false);
            delete dpadState[id];
          }
          /* Press the new direction */
          if (el && newKey) {
            var kc = parseInt(el.dataset.keycode, 10);
            if (isNaN(kc)) continue;
            dpadState[id] = { btn: el, key: newKey, code: el.dataset.code, keyCode: kc };
            el.classList.add('pressed');
            sendKey(newKey, el.dataset.code, kc, true);
          }
        }
      }

      function dpadRelease(changedTouches) {
        for (var i = 0; i < changedTouches.length; i++) {
          var id  = changedTouches[i].identifier;
          var cur = dpadState[id];
          if (cur) {
            cur.btn.classList.remove('pressed');
            sendKey(cur.key, cur.code, cur.keyCode, false);
            delete dpadState[id];
          }
        }
      }

      dpad.addEventListener('touchstart', function (e) {
        e.preventDefault();
        dpadUpdate(e.changedTouches);
      }, { passive: false });

      dpad.addEventListener('touchmove', function (e) {
        e.preventDefault();
        dpadUpdate(e.changedTouches);
      }, { passive: false });

      ['touchend', 'touchcancel'].forEach(function (evtype) {
        dpad.addEventListener(evtype, function (e) {
          e.preventDefault();
          dpadRelease(e.changedTouches);
        }, { passive: false });
      });

      /* ---- Action buttons (simple press/release — no sliding needed) ----- */
      var actionBtns = document.querySelectorAll('#action-btns [data-key]');
      actionBtns.forEach(function (btn) {
        var key     = btn.dataset.key;
        var code    = btn.dataset.code;
        var keyCode = parseInt(btn.dataset.keycode, 10);
        if (!key || !code || isNaN(keyCode)) return;

        btn.addEventListener('touchstart', function (e) {
          e.preventDefault();
          btn.classList.add('pressed');
          sendKey(key, code, keyCode, true);
        }, { passive: false });

        ['touchend', 'touchcancel'].forEach(function (evtype) {
          btn.addEventListener(evtype, function (e) {
            e.preventDefault();
            btn.classList.remove('pressed');
            sendKey(key, code, keyCode, false);
          }, { passive: false });
        });
      });
    })();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
